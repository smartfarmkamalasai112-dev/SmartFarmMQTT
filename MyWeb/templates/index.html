<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Farm Control Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Sarabun', sans-serif; padding: 20px; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: none; }
        .val-big { font-size: 2.2em; font-weight: bold; color: #2c3e50; }
        .unit { font-size: 0.9em; color: #7f8c8d; }
        .relay-btn { width: 100%; height: 60px; font-size: 1.2em; border-radius: 10px; margin-bottom: 10px; }
        .mode-badge { font-size: 1em; padding: 10px 20px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 900px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary">🌿 Smart Farm Dashboard</h2>
            <div id="mode-display" class="mode-badge bg-secondary text-white">Connecting...</div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card p-3">
                    <h5 class="text-muted">สภาพอากาศ & แวดล้อม</h5>
                    <div class="row text-center mt-2">
                        <div class="col-3"><div class="val-big" id="air_t">--</div><div>Temp (°C)</div></div>
                        <div class="col-3"><div class="val-big" id="air_h">--</div><div>Hum (%)</div></div>
                        <div class="col-3"><div class="val-big text-warning" id="lux">--</div><div>Lux</div></div>
                        <div class="col-3"><div class="val-big text-secondary" id="co2">--</div><div>CO2</div></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3">
                    <h5 class="text-muted">สภาพดิน (Soil NPK)</h5>
                    <div class="row text-center mt-2">
                        <div class="col-3"><div class="val-big" id="soil_hum">--</div><div>Hum (%)</div></div>
                        <div class="col-3"><div class="val-big text-success" id="soil_n">--</div><div>N</div></div>
                        <div class="col-3"><div class="val-big text-success" id="soil_p">--</div><div>P</div></div>
                        <div class="col-3"><div class="val-big text-success" id="soil_k">--</div><div>K</div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card p-4">
            <div class="d-flex justify-content-between mb-3">
                <h4>🎮 แผงควบคุม (Relay Control)</h4>
                <div>
                    <button class="btn btn-outline-primary me-2" onclick="setMode('AUTO')">โหมด AUTO</button>
                    <button class="btn btn-outline-danger" onclick="setMode('MANUAL')">โหมด MANUAL</button>
                </div>
            </div>
            
            <div class="row text-center" id="relay-container">
                </div>
        </div>
        
        <div class="card p-4">
             <h4>⚙️ ตั้งค่าเงื่อนไข (Auto Config)</h4>
             <div class="row" id="config-container">
                 </div>
        </div>
    </div>

    <script>
        const relayNames = ["💦 ปั๊มน้ำ", "💨 พัดลม", "💡 ไฟส่องสว่าง", "🌫️ พ่นหมอก"];
        let currentMode = "UNKNOWN";

        function updateData() {
            fetch('/api/data')
                .then(res => res.json())
                .then(data => {
                    // 1. Update Sensors
                    const s = data.sensors;
                    document.getElementById('air_t').innerText = s.air.temp;
                    document.getElementById('air_h').innerText = s.air.hum;
                    document.getElementById('lux').innerText = s.env.lux;
                    document.getElementById('co2').innerText = s.env.co2;
                    document.getElementById('soil_hum').innerText = s.soil.hum;
                    document.getElementById('soil_n').innerText = s.soil.n;
                    document.getElementById('soil_p').innerText = s.soil.p;
                    document.getElementById('soil_k').innerText = s.soil.k;

                    // 2. Update Mode Display
                    const st = data.status;
                    currentMode = st.mode;
                    const modeBadge = document.getElementById('mode-display');
                    if(st.mode === "AUTO") {
                        modeBadge.className = "mode-badge bg-success text-white";
                        modeBadge.innerText = "โหมด AUTO (ระบบทำงานเอง)";
                    } else {
                        modeBadge.className = "mode-badge bg-danger text-white";
                        modeBadge.innerText = "โหมด MANUAL (ควบคุมมือ)";
                    }

                    // 3. Render Buttons & Config (Only if not generated or simple update)
                    renderRelays(st.relays, st.config);
                });
        }

        function renderRelays(states, configs) {
            const container = document.getElementById('relay-container');
            const confContainer = document.getElementById('config-container');
            
            // Clean simple render (for demo smoothness, ideally use React/Vue)
            container.innerHTML = "";
            confContainer.innerHTML = "";

            states.forEach((isOn, idx) => {
                // --- Relay Button ---
                let btnClass = isOn ? "btn-success" : "btn-secondary";
                let disabled = (currentMode === "AUTO") ? "disabled" : "";
                let statusText = isOn ? "ON" : "OFF";
                
                let html = `
                <div class="col-md-3 col-6">
                    <button class="btn ${btnClass} relay-btn" ${disabled} onclick="toggleRelay(${idx}, ${!isOn})">
                        ${relayNames[idx]}<br>
                        <small>STATUS: ${statusText}</small>
                    </button>
                </div>`;
                container.innerHTML += html;

                // --- Config Input ---
                let conf = configs[idx] || {target:0, condition:"<"};
                let confHtml = `
                <div class="col-md-3 mb-3">
                    <label class="form-label">${relayNames[idx]}</label>
                    <div class="input-group">
                        <select class="form-select" id="cond-${idx}">
                            <option value="<" ${conf.condition=="<"?"selected":""}>ทำงานเมื่อ <</option>
                            <option value=">" ${conf.condition==">"?"selected":""}>ทำงานเมื่อ ></option>
                        </select>
                        <input type="number" class="form-control" id="target-${idx}" value="${conf.target}">
                        <button class="btn btn-outline-secondary" onclick="saveConfig(${idx})">💾</button>
                    </div>
                </div>`;
                confContainer.innerHTML += confHtml;
            });
        }

        function setMode(mode) {
            fetch('/api/mode', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mode: mode})
            });
        }

        function toggleRelay(idx, val) {
            fetch('/api/relay', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({index: idx, value: val})
            });
        }

        function saveConfig(idx) {
            let target = document.getElementById(`target-${idx}`).value;
            let cond = document.getElementById(`cond-${idx}`).value;
            fetch('/api/config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({index: idx, target: target, condition: cond})
            });
            alert("บันทึกค่าแล้ว!");
        }

        setInterval(updateData, 1000); // อัปเดตทุก 1 วินาที
    </script>
</body>
</html>
